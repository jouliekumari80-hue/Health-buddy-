<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Buddy</title>

<link rel="stylesheet" href="project.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    <h1>💚 Health Buddy</h1>
    <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">

    <h2>Daily Health Input</h2>

    <input type="number" id="steps" placeholder="👟 Steps">
    <input type="number" id="water" placeholder="💧 Water (L)">
    <input type="number" id="screen" placeholder="📱 Screen Time (hrs)">
    <input type="number" id="exercise" placeholder="🏃 Exercise (mins)">

    <div id="error" class="error"></div>

    <button onclick="analyze()">Analyze</button>

    <div class="results">
        <h2 id="score">💯 0</h2>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <div id="feedback"></div>
        <h3 id="streak"></h3>
        <h3 id="goal"></h3>
    </div>

    <!-- GRAPH -->
    <div class="box">
        <h3>📊 Weekly Progress</h3>
        <canvas id="chart"></canvas>
    </div>

    <!-- AI -->
    <div class="box">
        <h3>🤖 AI Suggestions</h3>
        <div id="aiTips"></div>
    </div>

    <!-- BMI -->
    <div class="box">
        <h3>🧮 BMI Calculator</h3>
        <input type="number" id="height" placeholder="Height (cm)">
        <input type="number" id="weight" placeholder="Weight (kg)">
        <button onclick="calculateBMI()">Calculate BMI</button>
        <div id="bmiResult"></div>
    </div>

    <!-- REMINDER -->
    <div class="box">
        <h3>🔔 Reminder</h3>
        <input type="time" id="reminderTime">
        <button onclick="setReminder()">Set Reminder</button>
        <p id="reminderStatus"></p>
    </div>

    <!-- NUTRITION -->
    <div class="box">
        <h3>🥗 Nutrition Guide</h3>
        <button onclick="showNutrition()">Get Tips</button>
        <div id="nutritionTips"></div>
    </div>

</div>

<footer>
    <p>Made with ❤️ | Health Buddy</p>
</footer>

<script src="project.js"></script>
</body>
</html>
